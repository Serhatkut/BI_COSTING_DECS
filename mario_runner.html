<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-BIT PLUMBER RUN</title>
    <style>
        /* NES Color Palette & Typography */
        :root {
            --sky-blue: #5c94fc;
            --ground-brown: #c84c0c;
            --ui-text: #ffffff;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', monospace;
            image-rendering: pixelated;
            /* Crucial for sharp 8-bit look */
        }

        #game-container {
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(92, 148, 252, 0.5);
        }

        canvas {
            display: block;
            background: var(--sky-blue);
            /* CSS gradient to simulate Mario ground */
            background-image: linear-gradient(transparent 85%, var(--ground-brown) 85%);
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--ui-text);
            text-shadow: 2px 2px #000;
            font-weight: bold;
            font-size: 16px;
            z-index: 3;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="ui-overlay">
            WORLD: <span id="level">1-1</span> |
            SCORE: <span id="distance">000000</span>
        </div>
        <canvas id="gameCanvas" width="640" height="360"></canvas>
    </div>

    <script>
        /**
         * 🎨 8-BIT ASSET GENERATION ENGINE
         * We define grids and color maps to draw sprites programmatically.
         */
        const ctx = document.getElementById('gameCanvas').getContext('2d');

        const PALETTE = {
            red: '#E60012',    // Hat/Shirt
            skin: '#FFCCC5',   // Face/Hands
            brown: '#884400',  // Hair/Shoes
            blue: '#0000BC',   // Overalls
            gold: '#FFD700',   // Q-Block main
            goldDark: '#B8860B', // Q-Block shadow
            pipeGreen: '#00A800',
            pipeDark: '#005000',
            black: '#000000'
        };

        // Helper: Draws a sprite based on a 2D string array and color map
        function drawSprite(map, colors, startX, startY, pixelScale) {
            for (let row = 0; row < map.length; row++) {
                for (let col = 0; col < map[row].length; col++) {
                    const colorCode = map[row][col];
                    if (colorCode !== ' ') { // ' ' is transparent
                        ctx.fillStyle = colors[colorCode];
                        ctx.fillRect(
                            startX + col * pixelScale,
                            startY + row * pixelScale,
                            pixelScale,
                            pixelScale
                        );
                    }
                }
            }
        }

        // 12x16 Jumping Mario Sprite Map
        const MARIO_SPRITE = [
            "    rrrrr   ",
            "   rrrrrrrrr",
            "   bbbssssb ",
            "  sbsssbsss ",
            "  sbsssbsss ",
            "  sbsssbsss ",
            "   bbbbbbb  ",
            "    bb bb   ",
            "   UUUUUUU  ",
            "  UUUUUUUUU ",
            "  UUUUUUUUU ",
            " UUUUUUUUUU ",
            " UUU UUUUUU ",
            " UUU  UUUUU ",
            "bbbb   bbbb ",
            "bbbb   bbbb "
        ];

        // 16x16 Question Block Sprite Map
        const Q_BLOCK_SPRITE = [
            "GGGGGGGGGGGGGGGG",
            "GggggggggggggggD",
            "GgGGGGGGGGGGggGD",
            "GgGggggggggGggGD",
            "GgGgBBBBBBgGggGD",
            "GgGgBBBBBBgGggGD",
            "GgGgggggBBgGggGD",
            "GgGggggBBGgGggGD",
            "GgGgggBBGggGggGD",
            "GgGggBBGgggGggGD",
            "GgGggggggggGggGD",
            "GgGggBBggggGggGD",
            "GgGggBBggggGggGD",
            "GgGggggggggGggGD",
            "GggggggggggggggD",
            "DDDDDDDDDDDDDDDD"
        ];

        /**
         * ⚙️ ENGINE STATE
         */
        const canvas = document.getElementById('gameCanvas');
        const GROUND_Y = canvas.height * 0.85; // Matches CSS gradient line
        const PIXEL_SCALE = 3; // Global scaler for the 8-bit look

        let state = {
            gravity: 0.7,
            speed: 5,
            level: 1,
            distance: 0,
            isGameOver: false,
            obstacles: [],
            frame: 0
        };

        const player = {
            x: 50,
            y: 100,
            // Dimensions calculated based on sprite grid size * PIXEL_SCALE
            w: 12 * PIXEL_SCALE,
            h: 16 * PIXEL_SCALE,
            dy: 0,
            jumpForce: -13,
            grounded: false,

            draw() {
                drawSprite(
                    MARIO_SPRITE,
                    { r: PALETTE.red, s: PALETTE.skin, b: PALETTE.brown, U: PALETTE.blue },
                    this.x, this.y, PIXEL_SCALE
                );
            },

            update() {
                this.dy += state.gravity;
                this.y += this.dy;

                // Ground collision check
                if (this.y + this.h > GROUND_Y) {
                    this.y = GROUND_Y - this.h;
                    this.dy = 0;
                    this.grounded = true;
                } else {
                    this.grounded = false;
                }
            },
            jump() { if (this.grounded) this.dy = this.jumpForce; }
        };

        class Obstacle {
            constructor() {
                this.type = Math.random() > 0.5 ? 'PIPE' : 'QBLOCK';
                this.x = canvas.width + 50;

                if (this.type === 'PIPE') {
                    this.w = 32; // Standard pipe width
                    this.h = 40 + Math.random() * 60; // Variable height
                    this.y = GROUND_Y - this.h;
                } else {
                    // QBLOCK sits in the air
                    this.w = 16 * PIXEL_SCALE; // 16x16 sprite scaled
                    this.h = 16 * PIXEL_SCALE;
                    this.y = GROUND_Y - 100 - (Math.random() * 60); // Floating height
                }
            }
            draw() {
                if (this.type === 'PIPE') {
                    // Draw Pipe Body
                    ctx.fillStyle = PALETTE.pipeGreen;
                    ctx.fillRect(this.x + 4, this.y + 15, this.w - 8, this.h - 15);
                    ctx.strokeStyle = PALETTE.pipeDark;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(this.x + 4, this.y + 15, this.w - 8, this.h - 15);

                    // Draw Pipe Top Flange
                    ctx.fillStyle = PALETTE.pipeGreen;
                    ctx.fillRect(this.x, this.y, this.w, 15);
                    ctx.strokeRect(this.x, this.y, this.w, 15);

                } else if (this.type === 'QBLOCK') {
                    drawSprite(
                        Q_BLOCK_SPRITE,
                        { G: PALETTE.gold, g: PALETTE.goldDark, B: PALETTE.black, D: PALETTE.brown },
                        this.x, this.y, PIXEL_SCALE
                    );
                }
            }
            update() { this.x -= state.speed; }
        }

        /**
         * 🎮 CORE LOOP & INPUT
         */
        function handleInput() {
            const action = () => {
                if (state.isGameOver) resetSimulation(); else player.jump();
            };
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'ArrowUp') action();
            });
            canvas.addEventListener('touchstart', action, { passive: false });
        }

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.w &&
                rect1.x + rect1.w > rect2.x &&
                rect1.y < rect2.y + rect2.h &&
                rect1.y + rect1.h > rect2.y
            );
        }

        function update() {
            if (state.isGameOver) return;
            state.frame++;
            state.distance++;

            // Difficulty Scaling
            if (state.distance % 1000 === 0) {
                state.level++;
                state.speed += 0.8;
                document.getElementById('level').innerText = `1-${state.level}`;
            }

            // Spawning Logic (faster as levels increase)
            let spawnRate = Math.max(30, 90 - (state.level * 5));
            if (state.frame % spawnRate === 0) state.obstacles.push(new Obstacle());

            player.update();

            state.obstacles.forEach((obs, i) => {
                obs.update();
                if (checkCollision(player, obs)) state.isGameOver = true;
                if (obs.x + obs.w < -50) state.obstacles.splice(i, 1);
            });

            document.getElementById('distance').innerText = state.distance.toString().padStart(6, '0');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            state.obstacles.forEach(obs => obs.draw());
            player.draw();

            if (state.isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = PALETTE.uiText;
                ctx.textAlign = "center";
                ctx.font = '30px "Courier New"';
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
                ctx.font = '20px "Courier New"';
                ctx.fillText("Press Space to Restart", canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function resetSimulation() {
            state = { gravity: 0.7, speed: 5, level: 1, distance: 0, isGameOver: false, obstacles: [], frame: 0 };
            player.y = 100;
            document.getElementById('level').innerText = "1-1";
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Initialize
        handleInput();
        loop();
    </script>
</body>

</html>
