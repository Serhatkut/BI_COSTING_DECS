<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.INVADERS_V1.0</title>
    <style>
        body {
            background: #050505;
            color: #00FF41;
            /* Matrix/Terminal Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            background: #000;
        }

        .stats {
            margin-bottom: 10px;
            width: 800px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <div class="stats">
        <div id="score">SCORE: 0000</div>
        <div id="status">SYSTEM_ACTIVE</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        /**
         * CORE ENGINE CONFIGURATION
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        let score = 0;
        let gameActive = true;

        const config = {
            playerSize: 40,
            playerSpeed: 7,
            invaderRows: 5,
            invaderCols: 10,
            invaderSize: 30,
            invaderPadding: 15,
            bulletSpeed: 8
        };

        // Input Handling
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        /**
         * ENTITY MODELS
         */
        class Player {
            constructor() {
                this.width = config.playerSize;
                this.height = 20;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 40;
            }
            draw() {
                ctx.fillStyle = '#00FF41';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.fillRect(this.x + this.width / 2 - 5, this.y - 10, 10, 10);
            }
            update() {
                if (keys['ArrowLeft'] && this.x > 0) this.x -= config.playerSpeed;
                if (keys['ArrowRight'] && this.x < canvas.width - this.width) this.x += config.playerSpeed;
            }
        }

        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 3;
            }
            draw() {
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.y -= config.bulletSpeed;
            }
        }

        class Invader {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = config.invaderSize;
                this.height = config.invaderSize;
            }
            draw() {
                ctx.fillStyle = '#FF3131';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Visual "eyes" for the sprite
                ctx.clearRect(this.x + 5, this.y + 5, 5, 5);
                ctx.clearRect(this.x + 20, this.y + 5, 5, 5);
            }
        }

        /**
         * SIMULATION LOGIC
         */
        const player = new Player();
        let bullets = [];
        let invaders = [];
        let invaderDirection = 1;
        let invaderMoveTimer = 0;

        // Initialize Swarm
        function initInvaders() {
            for (let r = 0; r < config.invaderRows; r++) {
                for (let c = 0; c < config.invaderCols; c++) {
                    let x = c * (config.invaderSize + config.invaderPadding) + 50;
                    let y = r * (config.invaderSize + config.invaderPadding) + 50;
                    invaders.push(new Invader(x, y));
                }
            }
        }

        function checkCollisions() {
            bullets.forEach((bullet, bIndex) => {
                invaders.forEach((invader, iIndex) => {
                    if (bullet.x > invader.x && bullet.x < invader.x + invader.width &&
                        bullet.y > invader.y && bullet.y < invader.y + invader.height) {
                        invaders.splice(iIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 100;
                        scoreElement.innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
                    }
                });
            });
        }

        function updateInvaders() {
            let edgeHit = false;
            invaders.forEach(inv => {
                inv.x += invaderDirection * 1;
                if (inv.x + inv.width > canvas.width || inv.x < 0) edgeHit = true;
                if (inv.y + inv.height >= player.y) gameActive = false;
            });

            if (edgeHit) {
                invaderDirection *= -1;
                invaders.forEach(inv => inv.y += 20);
            }
        }

        /**
         * THE GAME LOOP
         */
        function loop() {
            if (!gameActive) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#FF3131";
                ctx.font = "40px Courier New";
                ctx.fillText("SYSTEM CRITICAL: GAME OVER", 100, canvas.height / 2);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.update();
            player.draw();

            if (keys['Space']) {
                if (bullets.length < 3) { // Rate limiting
                    bullets.push(new Bullet(player.x + player.width / 2, player.y));
                    keys['Space'] = false; // Semi-auto behavior
                }
            }

            bullets.forEach((b, i) => {
                b.update();
                b.draw();
                if (b.y < 0) bullets.splice(i, 1);
            });

            updateInvaders();
            invaders.forEach(inv => inv.draw());

            checkCollisions();

            if (invaders.length === 0) {
                ctx.fillStyle = "#00FF41";
                ctx.font = "40px Courier New";
                ctx.fillText("SECTOR CLEARED", 220, canvas.height / 2);
                return;
            }

            requestAnimationFrame(loop);
        }

        initInvaders();
        loop();
    </script>

</body>

</html>
